# Pre-commit hooks configuration
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: '^\.ai-knowledges/'
      - id: end-of-file-fixer
        exclude: '^\.ai-knowledges/'
      - id: check-json
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  # JSON formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [json, markdown, yaml]
        args: [--write]
        exclude: '^\.ai-knowledges/'

  # TypeScript type checking (if available)
  - repo: local
    hooks:
      - id: check-security-files
        name: Check security files don't have real keys
        entry: bash -c 'grep -rE "fw-[a-zA-Z0-9_-]{20,}" . --include="*.json" --include="*.env*" 2>/dev/null | grep -v "example\|placeholder\|your-" && exit 1 || exit 0'
        language: system
        pass_filenames: false
        always_run: true
